{% extends "base.html" %}

{% block title %}TCA Login{% endblock %}

{% block content %}
<section>
  <h1>TCA Login</h1>
  {% if error_message %}
  <p id="login-error" role="alert" style="color: var(--pico-del-color);">{{ error_message }}</p>
  {% endif %}
  <form method="post" action="/ui/login">
    <label for="token">Bootstrap Token</label>
    <input type="password" id="token" name="token" placeholder="Paste your bootstrap token" required />
    <small>Find the token in the file written at server startup.</small>
    <button type="submit">Sign in</button>
  </form>
</section>
{% endblock %}
